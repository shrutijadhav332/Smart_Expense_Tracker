# ============================================
# Smart Personal Expense Tracker - Configuration
# ============================================

spring.application.name=Smart Personal Expense Tracker

# ---- Server ----
server.port=8080
server.address=0.0.0.0

# ---- Database (auto-switches based on environment variables) ----
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:expense_tracker_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.driverClassName=${SPRING_DATASOURCE_DRIVER:org.h2.Driver}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ---- JPA / Hibernate ----
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ---- Thymeleaf ----
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.cache=false

# ---- Static Resources ----
spring.web.resources.static-locations=classpath:/static/

# ---- Date Format ----
spring.jackson.date-format=yyyy-MM-dd
spring.jackson.serialization.write-dates-as-timestamps=false
