# ============================================
# Smart Personal Expense Tracker - Configuration
# ============================================

spring.application.name=Smart Personal Expense Tracker

# ---- Server ----
server.port=8080
server.address=0.0.0.0

# ---- Database (H2 for development) ----
# Switch to MySQL for production by uncommenting MySQL section
spring.datasource.url=jdbc:h2:file:./data/expense_tracker_db
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ---- MySQL (Production) ----
# spring.datasource.url=jdbc:mysql://localhost:3306/expense_tracker_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
# spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
# spring.datasource.username=root
# spring.datasource.password=your_password

# ---- JPA / Hibernate ----
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=${DB_DIALECT:org.hibernate.dialect.H2Dialect}
# For Postgres on Render use DB_DIALECT=org.hibernate.dialect.PostgreSQLDialect

# ---- Thymeleaf ----
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.cache=false

# ---- Static Resources ----
spring.web.resources.static-locations=classpath:/static/

# ---- Date Format ----
spring.jackson.date-format=yyyy-MM-dd
spring.jackson.serialization.write-dates-as-timestamps=false
