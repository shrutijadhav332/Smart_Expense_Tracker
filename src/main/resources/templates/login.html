<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Smart Expense Tracker</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at 10% 20%, rgba(79, 70, 229, 0.1) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(34, 197, 94, 0.1) 0%, transparent 40%),
                var(--bg-primary);
        }

        .login-card {
            width: 100%;
            max-width: 420px;
            padding: 40px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-xl);
            animation: fadeInUp 0.6s ease;
        }

        .login-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .login-logo {
            width: 64px;
            height: 64px;
            background: var(--gradient-primary);
            border-radius: var(--radius-lg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            color: white;
            margin: 0 auto 16px;
            box-shadow: var(--shadow-glow-primary);
        }

        .login-title {
            font-size: 24px;
            font-weight: 800;
            color: var(--text-primary);
            letter-spacing: -1px;
        }

        .login-subtitle {
            font-size: 14px;
            color: var(--text-muted);
        }

        .form-footer {
            margin-top: 24px;
            text-align: center;
            font-size: 14px;
            color: var(--text-muted);
        }

        .form-footer a {
            color: var(--primary-light);
            font-weight: 600;
        }

        .social-login {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }

        .social-btn {
            flex: 1;
            padding: 10px;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            background: var(--bg-input);
            color: var(--text-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 13px;
            transition: all var(--transition-fast);
            cursor: pointer;
        }

        .social-btn:hover {
            background: var(--bg-card-hover);
        }
    </style>
</head>

<body>
    <div class="login-card">
        <div class="login-header">
            <div class="login-logo">
                <i class="fas fa-wallet"></i>
            </div>
            <h1 class="login-title">Welcome Back</h1>
            <p class="login-subtitle">Manage your expenses with ease</p>
        </div>

        <form onsubmit="event.preventDefault(); window.location.href='/dashboard'">
            <div class="form-group">
                <label class="form-label">Email Address</label>
                <div style="position: relative;">
                    <i class="fas fa-envelope"
                        style="position: absolute; left: 16px; top: 16px; color: var(--text-muted);"></i>
                    <input type="email" class="form-control" style="padding-left: 44px;" placeholder="name@example.com"
                        value="demo@example.com" required>
                </div>
            </div>

            <div class="form-group">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
                    <label class="form-label" style="margin-bottom: 0;">Password</label>
                    <a th:href="@{/forgot-password}" style="font-size: 12px; color: var(--primary-light);">Forgot?</a>
                </div>
                <div style="position: relative;">
                    <i class="fas fa-lock"
                        style="position: absolute; left: 16px; top: 16px; color: var(--text-muted);"></i>
                    <input type="password" class="form-control" style="padding-left: 44px;" placeholder="••••••••"
                        value="password" required>
                </div>
            </div>

            <button type="submit" class="btn btn-primary btn-lg" style="width: 100%; margin-top: 8px;">
                Sign In <i class="fas fa-arrow-right"></i>
            </button>
        </form>

        <div style="display: flex; align-items: center; margin: 24px 0; gap: 12px;">
            <div style="flex: 1; height: 1px; background: var(--border-color);"></div>
            <span style="font-size: 12px; color: var(--text-muted); text-transform: uppercase;">Or continue with</span>
            <div style="flex: 1; height: 1px; background: var(--border-color);"></div>
        </div>

        <div class="social-login">
            <div class="social-btn">
                <i class="fab fa-google" style="color: #ea4335;"></i> Google
            </div>
            <div class="social-btn">
                <i class="fab fa-apple"></i> Apple
            </div>
        </div>

        <div class="form-footer">
            Don't have an account? <a th:href="@{/register}">Create One</a>
        </div>
    </div>
</body>

</html>
